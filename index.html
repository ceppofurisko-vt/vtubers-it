<!DOCTYPE html>
<html lang="it">
<head>

    <!-- Disattivare dopo approvazione -->
<meta name="robots" content="noindex"> 
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO -->
    <title>Vtubers.it</title>
    <meta name="description" content="In arrivo nel 2027 su Vtube Italia">
    <meta name="keywords" content="vtuber italiani, vtuber, vtubers, directory vtuber, network vtuber, community vtuber, virtual youtuber italia, vtuber twitch, vtuber youtube">
    <link rel="canonical" href="https://www.vtubers.it/" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0f0b1f 0%, #1e1335 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            padding: 1rem;
        }

        .container {
            text-align: center;
            max-width: 900px;
            width: 100%;
        }

        
        .pulse-text {
            color: #d9b8ff;          
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            line-height: 1.2;
            
            /* Animazione pulsante */
            animation: pulse 2.8s infinite ease-in-out;
            
            /* Effetto glow viola */
            text-shadow: 0 0 15px #a855f7, 0 0 25px #c084fc;
            
            transform-origin: center;
            will-change: transform, opacity, text-shadow;
        }

        
        .year {
            display: block;
            font-size: 1.8em;        
            color: #f0a6ff;          
            text-shadow: 0 0 25px #e879f9, 0 0 50px #d946ef, 0 0 70px #c026d3;
            margin-top: 0.2em;
            letter-spacing: 0.2em;
            font-weight: 800;
        }

        
        .subtitle {
            color: #cdb5e8;
            font-size: 1.3rem;
            letter-spacing: 3px;
            margin-top: 2rem;
            opacity: 0.9;
            font-weight: 400;
            text-transform: uppercase;
            border-top: 1px solid rgba(216, 180, 254, 0.3);
            display: inline-block;
            padding-top: 1.5rem;
            padding-left: 2rem;
            padding-right: 2rem;
        }

        
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.9;
                text-shadow: 0 0 15px #a855f7, 0 0 25px #c084fc;
            }
            50% {
                transform: scale(1.08);
                opacity: 1;
                text-shadow: 0 0 30px #c084fc, 0 0 60px #d946ef, 0 0 80px #e879f9;
            }
            100% {
                transform: scale(1);
                opacity: 0.9;
                text-shadow: 0 0 15px #a855f7, 0 0 25px #c084fc;
            }
        }

        .year {
            animation: pulseYear 2.8s infinite ease-in-out;
        }

        @keyframes pulseYear {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 25px #e879f9, 0 0 50px #d946ef, 0 0 70px #c026d3;
            }
            50% {
                transform: scale(1.05);
                text-shadow: 0 0 40px #f0a6ff, 0 0 80px #e879f9, 0 0 120px #c084fc;
            }
        }

        @media (max-width: 600px) {
            .pulse-text {
                letter-spacing: 0.05em;
            }
            .year {
                letter-spacing: 0.15em;
            }
            .subtitle {
                font-size: 1rem;
                letter-spacing: 2px;
            }
        }

        .background-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100%;
            max-width: 800px;
            height: 100%;
            max-height: 800px;
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: glowMove 10s infinite alternate;
        }

        @keyframes glowMove {
            0% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="container">
        <h1 class="pulse-text">
            In arrivo
            <span class="year">2027</span>
        </h1>
    </div>
</body>
</html>
